<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Provider Dispatch Dashboard</title>
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <link rel="stylesheet" href="css/main.css">
    <style>
        .ticket-list {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            margin-top: 1.5rem;
        }
        .ticket-card {
            border-left: 6px solid #cbd5e1;
            padding: 1.75rem;
            background: var(--card-bg);
            border-radius: 8px;
            border-top: 1px solid var(--border);
            border-right: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }
        .ticket-card.Pending {
            border-left-color: var(--danger);
        }
        .ticket-card.Dispatched {
            border-left-color: var(--primary);
            opacity: 0.8;
        }
        .meta-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.75rem;
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 500;
        }
        .ticket-card h3 {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--dark-bg);
        }
        .ticket-card p {
            margin: 0.4rem 0;
            font-size: 0.95rem;
        }
        .badge {
            display: inline-block;
            padding: 0.25rem 0.5rem;
            font-size: 0.75rem;
            font-weight: 700;
            border-radius: 4px;
            background-color: #f1f5f9;
            color: #334155;
        }
        .Pending .badge {
            background-color: #fee2e2;
            color: #991b1b;
        }
        .Dispatched .badge {
            background-color: #dbeafe;
            color: #1e40af;
        }
        .btn-claim {
            width: auto;
            margin-top: 1.25rem;
            background-color: var(--primary);
            color: white;
            padding: 0.6rem 1.25rem;
            font-size: 0.875rem;
        }
        .btn-claim:hover {
            background-color: var(--primary-hover);
        }
    </style>
</head>
<body>
    <header>
        <h1>RescueRoute Pro</h1>
        <p>Operator Dispatch & Emergency Queue Management</p>
    </header>

    <main class="container" style="max-width: 640px;">
        <h2 style="font-size: 1.5rem; font-weight: 700; margin-bottom: 0.25rem;">Active Incident Logs</h2>
        <p style="color: var(--text-muted); font-size: 0.95rem; margin-bottom: 1.5rem;">Real-time breakdown requests powered by driver-side computer vision models.</p>
        <div id="queue-container" class="ticket-list"></div>
    </main>

    <script src="js/provider.js"></script>
</body>
</html>
